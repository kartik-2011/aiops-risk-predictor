<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIOps Incident Risk Predictor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #5d6d7e;
        --line: #d9dee7;
        --primary: #2563eb;
        --ok: #15803d;
        --warn: #b45309;
        --bad: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .shell {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 72px;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--ok);
        font-weight: 700;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
      }

      main {
        padding: 28px 0;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 20px;
      }

      section,
      aside {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 18px;
      }

      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 11px 12px;
        font: inherit;
      }

      .full {
        grid-column: 1 / -1;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: var(--primary);
        color: white;
        padding: 12px 16px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .score {
        display: grid;
        place-items: center;
        min-height: 190px;
        border: 1px solid var(--line);
        border-radius: 8px;
        text-align: center;
      }

      .score strong {
        display: block;
        font-size: 56px;
        line-height: 1;
      }

      .level {
        margin-top: 8px;
        text-transform: uppercase;
        font-weight: 900;
        letter-spacing: 0;
      }

      ul {
        margin: 16px 0 0;
        padding-left: 20px;
        color: var(--muted);
      }

      li + li {
        margin-top: 8px;
      }

      @media (max-width: 820px) {
        .grid,
        form {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
          padding: 18px 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="shell topbar">
        <h1>AIOps Incident Risk Predictor</h1>
        <span class="status"><span class="dot"></span> Live</span>
      </div>
    </header>

    <main class="shell grid">
      <section>
        <h2>Service Telemetry</h2>
        <form id="telemetry-form">
          <label class="full">
            Service name
            <input name="service_name" value="payment-api" required />
          </label>
          <label>
            CPU %
            <input name="cpu_percent" type="number" min="0" max="100" value="86" required />
          </label>
          <label>
            Memory %
            <input name="memory_percent" type="number" min="0" max="100" value="78" required />
          </label>
          <label>
            Latency ms
            <input name="latency_ms" type="number" min="0" value="930" required />
          </label>
          <label>
            Error rate %
            <input name="error_rate_percent" type="number" min="0" max="100" step="0.1" value="7.5" required />
          </label>
          <label class="full">
            Requests per minute
            <input name="requests_per_minute" type="number" min="0" value="2400" required />
          </label>
          <button class="full" type="submit">Predict Incident Risk</button>
        </form>
      </section>

      <aside>
        <h2>Risk Result</h2>
        <div class="score">
          <div>
            <strong id="score">--</strong>
            <div id="level" class="level">Waiting</div>
          </div>
        </div>
        <ul id="recommendations">
          <li>Submit telemetry to generate recommendations.</li>
        </ul>
      </aside>
    </main>

    <script>
      const form = document.querySelector("#telemetry-form");
      const score = document.querySelector("#score");
      const level = document.querySelector("#level");
      const recommendations = document.querySelector("#recommendations");

      const colors = {
        low: "#15803d",
        medium: "#b45309",
        high: "#c2410c",
        critical: "#b91c1c",
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());

        for (const key of ["cpu_percent", "memory_percent", "latency_ms", "error_rate_percent"]) {
          data[key] = Number(data[key]);
        }
        data.requests_per_minute = Number(data.requests_per_minute);

        const response = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const result = await response.json();

        score.textContent = result.risk_score;
        level.textContent = result.risk_level;
        level.style.color = colors[result.risk_level] || "#17202a";
        recommendations.innerHTML = result.recommendations.map((item) => `<li>${item}</li>`).join("");
      });
    </script>
  </body>
</html>
