apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-risk-predictor
  labels:
    app: aiops-risk-predictor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aiops-risk-predictor
  template:
    metadata:
      labels:
        app: aiops-risk-predictor
    spec:
      containers:
        - name: aiops-risk-predictor
          image: aiops-risk-predictor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: aiops-risk-predictor-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

