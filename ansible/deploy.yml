---
- name: Deploy AIOps Incident Risk Predictor with Docker
  hosts: app_servers
  become: true

  vars:
    app_name: aiops-risk-predictor
    app_dir: /opt/aiops-risk-predictor
    app_port: 8000

  tasks:
    - name: Install system packages
      ansible.builtin.apt:
        name:
          - docker.io
          - python3-pip
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy project files
      ansible.builtin.copy:
        src: ../
        dest: "{{ app_dir }}"
        mode: "0644"

    - name: Build Docker image
      community.docker.docker_image:
        name: "{{ app_name }}"
        tag: latest
        source: build
        build:
          path: "{{ app_dir }}"

    - name: Run application container
      community.docker.docker_container:
        name: "{{ app_name }}"
        image: "{{ app_name }}:latest"
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "{{ app_port }}:8000"

